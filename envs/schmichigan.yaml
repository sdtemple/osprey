name: schmichigan
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python>=3.12
  - numpy>=2.1.3
  - pip
  - pip:
    - audiomentations
    - soundfile
    - kagglehub
    - kaggle
  - jupyter
  - notebook
  - papermill
  # general ml/stats
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - networkx
  - scikit-learn
  # neural networks
  - pytorch
  - safetensors
  - torchvision
  - torchaudio
  - tensorflow
  - keras
  - statsmodels
  - transformers
  - datasets
  - nltk
  # audio
  - librosa
  - pydub
